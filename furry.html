<html><head>
  <meta charset="UTF-8">

  <title>TITLE</title>
  <link href="furry.css" rel="stylesheet" type="text/css" media="all">
<script>
function toggleMenu(button) {
    const allMenus = document.querySelectorAll(".menu");
    allMenus.forEach(menu => {
        if (menu !== button.nextElementSibling) {
            menu.classList.remove("open");
        }
    });
    button.nextElementSibling.classList.toggle("open");
}
</script>
</head>
<body>
<div class="middle">
  <div class="button">
    <div class="dropdown">
      <button onclick="toggleMenu(this)">Click Me!</button>
      <div class="menu">
        <ul>
